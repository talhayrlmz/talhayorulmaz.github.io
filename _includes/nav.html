<nav class="site-nav" aria-label="Ana menü">
  <div class="container">
    <ul>
      {% for item in site.data.menu %}
        {% assign item_url = item.url | relative_url %}
        <li>
          <a
            href="{{ item_url }}"
            {% if page.url == item.url or page.url == item.url | append: '.html' %}aria-current="page"{% endif %}
          >
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</nav>
