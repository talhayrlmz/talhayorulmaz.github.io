<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 2rem;
      text-align: center;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.5rem;
      color: #00ffc3;
      margin-bottom: 1rem;
    }

    nav a {
      background-color: #1e1e1e;
      padding: 0.5rem 1rem;
      margin: 0.5rem;
      border-radius: 8px;
      display: inline-block;
      color: #00bcd4;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.3s;
    }

    nav a:hover {
      background-color: #2e2e2e;
      color: #26dada;
    }

    main {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-top: 2rem;
      font-size: 1.2rem;
    }

    h1, h2, h3 {
      color: #00ffc3;
      margin-top: 2rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 0.5rem;
    }

    p {
      line-height: 1.8;
      margin: 1rem 0;
    }

    code, pre {
      background: #222;
      padding: 0.2rem 0.4rem;
      border-radius: 5px;
      font-family: 'Fira Code', monospace;
    }

    footer {
      color: #777;
      font-size: 0.9rem;
      margin-top: 3rem;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1rem;
      }

      nav a {
        display: block;
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Talha Yorulmaz</h1>
      <nav>
        <a href="/">Ana Sayfa</a>
        <a href="/hakkimda">Hakkımda</a>
        <a href="/rehberler">Rehberler</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>&copy; 2025 Talha Yorulmaz</p>
    </footer>
  </div>
</body>
</html>
